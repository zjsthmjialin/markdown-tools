appId: com.markany.app
productName: MarkAny
directories:
  output: release
  buildResources: build
files:
  - dist
  - dist-electron
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
