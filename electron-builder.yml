appId: com.markany.app
productName: MarkAny
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!**/__pycache__"
  - "!**/*.pyc"

extraResources:
  - from: src/python/dist/
    to: python-backend/
    filter:
      - "markany-backend*"
  - from: src/python/
    to: python-source/
    filter:
      - "converters/*.py"
      - "utils/*.py"
      - "requirements.txt"
      - "main.py"
      - "!**/__pycache__"
      - "!**/*.pyc"
      - "!dist/**"
      - "!build/**"
      - "!*.spec"
  - from: src/python/portable-python/
    to: python-portable/
    filter:
      - "**/*"
      - "!**/__pycache__"
      - "!**/*.pyc"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MarkAny

mac:
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  category: public.app-category.utilities
  hardenedRuntime: false
  entitlements: null
  entitlementsInherit: null

asar: true
