appId: com.markany.app
productName: MarkAny
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!**/__pycache__"
  - "!**/*.pyc"

extraResources:
  - from: src/python/dist/markany-backend.exe
    to: python-backend/markany-backend.exe
    filter:
      - "**/*"
  - from: src/python/tesseract-portable
    to: python-backend/tesseract
    filter:
      - "**/*"
  - from: src/python/
    to: python-source/
    filter:
      - "converters/*.py"
      - "utils/*.py"
      - "requirements.txt"
      - "!**/__pycache__"
      - "!**/*.pyc"
      - "!dist/**"
      - "!build/**"
      - "!tesseract-portable/**"
      - "!*.spec"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MarkAny

asar: true
